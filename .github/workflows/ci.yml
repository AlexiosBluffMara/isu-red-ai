name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check pipeline/ search/ web/ --select E,W,F --ignore E501

      - name: Type check (syntax validation)
        run: python -m py_compile web/app.py && python -m py_compile web/papers_data.py

      - name: Run tests
        env:
          GEMINI_API_KEY: "test-key-for-unit-tests"
          PAPERS_DB: "tests/fixtures/sample_papers.json"
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t isu-red-ai:${{ github.sha }} .

      - name: Verify container starts
        run: |
          docker run -d --name test-container \
            -e GEMINI_API_KEY=test-key \
            -p 8080:8080 \
            isu-red-ai:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop test-container
