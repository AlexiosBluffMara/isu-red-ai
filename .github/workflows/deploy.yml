name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      region:
        description: "GCP region"
        default: "us-central1"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/isu-red-ai/web:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy isu-red-ai \
            --image "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/isu-red-ai/web:${{ github.sha }}" \
            --region ${{ inputs.region }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 4 \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "LANCEDB_DIR=/app/data/lancedb" \
            --set-env-vars "PAPERS_DB=/app/data/metadata/papers_database.json" \
            --port 8080 \
            --timeout 300
